# Ontario Parks Reservation Bot — Configuration
# Remplissez vos informations ici avant de lancer le bot.

account:
  email: "votre@courriel.com"       # Votre courriel Ontario Parks
  password: "votre_mot_de_passe"    # Votre mot de passe (ne partagez jamais ce fichier)

reservation:
  park_name: "Balsam Lake"          # Nom du parc tel qu'affiché sur le site
  campground: "Balsam Lake"         # Nom du terrain de camping (souvent même nom)
  site_number: "153"                # Numéro de site préféré (laisser vide "" pour prendre le premier disponible)
  arrival_date: "2026-08-20"        # Date d'arrivée (format YYYY-MM-DD)
  num_nights: 3                     # Nombre de nuits
  party_size: 3                     # Nombre de personnes
  equipment_type: "tent"            # "tent" | "trailer" | "rv" | "any"

# Sites alternatifs si le site principal est pris (optionnel)
fallback_sites:
  - ""                              # Laisser vide = premier site disponible

scheduler:
  # Heure à laquelle la fenêtre de réservation s'ouvre (heure de l'Est)
  # Ontario Parks ouvre les réservations à 7h00 AM ET, 5 mois à l'avance
  open_time: "07:00"                # Format HH:MM (heure de l'Est)
  # Le bot se met en attente et frappe pile à cette heure
  # Lancer le script la veille au soir ou quelques minutes avant

bot:
  # Mode de fonctionnement :
  #   explore   → navigue sans se connecter, affiche les disponibilités (test sécuritaire)
  #   dry_run   → se connecte, remplit le formulaire, S'ARRÊTE avant de payer (test complet)
  #   live      → exécute la réservation réelle
  mode: "dry_run"

  # Comportement humain (anti-détection)
  headless: false                   # false = navigateur visible (recommandé), true = invisible
  slow_typing: true                 # Tape caractère par caractère comme un humain
  min_delay_ms: 800                 # Délai minimum entre actions (millisecondes)
  max_delay_ms: 2200                # Délai maximum entre actions (millisecondes)
