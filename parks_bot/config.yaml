# Ontario Parks Reservation Bot — Configuration
# Remplissez vos informations ici avant de lancer le bot.
# ⚠️  Ne partagez jamais ce fichier — il contient vos identifiants.

account:
  email: "votre@courriel.com"       # Votre courriel Ontario Parks
  password: "votre_mot_de_passe"    # Votre mot de passe

reservation:
  type: "backcountry"               # "backcountry" (arrière-pays) | "frontcountry" (camping régulier)
  park_name: "Killarney"            # Nom du parc tel qu'affiché sur le site Ontario Parks
  access_point: "Bell Lake"         # Point d'accès (Bell Lake ou George Lake pour Killarney)
  entry_date: "2026-08-20"          # Date d'entrée (format YYYY-MM-DD)
  num_nights: 3                     # Nombre de nuits total
  party_size: 3                     # Nombre de personnes (ajustez au besoin)
  num_canoes: 2                     # Nombre d'embarcations

  # Itinéraire nuit par nuit
  # Laissez site_number vide ("") pour prendre le premier disponible sur ce lac.
  itinerary:
    - night: 1
      lake: "Balsam Lake"
      site_number: "153"
    - night: 2
      lake: "Balsam Lake"
      site_number: "151"
    - night: 3
      lake: "Bell Lake"
      site_number: "134"

  # Sites alternatifs pour la nuit 1 si le site 153 est pris
  fallback_sites_night1:
    - ""                            # laisser vide = premier disponible sur Balsam Lake

scheduler:
  # Ontario Parks ouvre les réservations à 7h00 AM heure de l'Est, 5 mois à l'avance.
  # Pour une entrée le 20 août 2026 → fenêtre ouvre le 20 mars 2026 à 7h00 AM.
  open_time: "07:00"                # Format HH:MM (heure de l'Est)
  # Lancez le script la veille au soir avec --wait pour qu'il se déclenche automatiquement.

bot:
  # Mode de fonctionnement :
  #   explore   → navigue sans se connecter, affiche les disponibilités (test 100% sécuritaire)
  #   dry_run   → se connecte, remplit le formulaire, S'ARRÊTE avant de payer
  #   live      → exécute la réservation réelle
  mode: "dry_run"

  # Comportement humain (anti-détection)
  headless: false                   # false = navigateur visible (recommandé), true = invisible
  slow_typing: true                 # Tape caractère par caractère comme un humain
  min_delay_ms: 800                 # Délai minimum entre actions (millisecondes)
  max_delay_ms: 2200                # Délai maximum entre actions (millisecondes)
